<VirtualHost *:80>
    ServerName localhost

    # 🔹 Página por defecto de Apache sigue disponible en "/"
    #DocumentRoot /var/www/html

    # 🔹 Configuración proxy
    ProxyPreserveHost On
    ProxyRequests Off

    # --- Next.js app ---
    ProxyPass "/wizard/" "http://127.0.0.1:3000/wizard/"
    ProxyPassReverse "/wizard/" "http://127.0.0.1:3000/wizard/"
    # --- Compiler Explorer ---
    ProxyPass "/ce/" "http://127.0.0.1:10240/"
    ProxyPassReverse "/ce/" "http://127.0.0.1:10240/"

    # 🔹 (Opcional) Logs
    ErrorLog ${APACHE_LOG_DIR}/proxy_error.log
    CustomLog ${APACHE_LOG_DIR}/proxy_access.log combined
    ProxyPass "/wizard/_next/" "http://127.0.0.1:3000/wizard/_next/"
    ProxyPassReverse "/wizard/_next/" "http://127.0.0.1:3000/wizard/_next/"
</VirtualHost>

