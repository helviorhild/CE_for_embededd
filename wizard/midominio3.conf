<VirtualHost *:80>
    ServerName localhost

    # 🔹 Página por defecto de Apache sigue disponible en "/"
    DocumentRoot /var/www/html

    # 🔹 Configuración proxy
    ProxyPreserveHost On
    ProxyRequests Off

    # --- Next.js app ---
    ProxyPass "/wizard/" "http://127.0.0.1:3000/"
    ProxyPassReverse "/wizard/" "http://127.0.0.1:3000/"
    # --- Compiler Explorer ---
    ProxyPass "/ce" "http://127.0.0.1:10240/"
    ProxyPassReverse "/ce" "http://127.0.0.1:10240/"

    # 🔹 (Opcional) Logs
    ErrorLog ${APACHE_LOG_DIR}/proxy_error.log
    CustomLog ${APACHE_LOG_DIR}/proxy_access.log combined
    ProxyPass "/_next/" "http://127.0.0.1:3000/_next"
    ProxyPassReverse "/_next/" "http://127.0.0.1:3000/_next"
</VirtualHost>

